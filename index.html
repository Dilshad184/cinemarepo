<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CineMagic - Premium Cinema Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 1%) rotate(2deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        /* Navigation */
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--primary);
            margin-right: 8px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .booking-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 3rem 1rem 4rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        /* Movie Grid */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .movie-poster {
            width: 100%;
            height: 380px;
            object-fit: cover;
        }

        .movie-info {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            color: var(--gray);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .movie-rating {
            color: var(--warning);
        }

        /* Booking Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            border: 1px solid var(--glass-border);
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--danger);
        }

        /* Seat Layout */
        .screen {
            background: linear-gradient(180deg, var(--primary), transparent);
            height: 8px;
            border-radius: 4px;
            margin: 2rem 0;
            text-align: center;
            position: relative;
        }

        .screen::after {
            content: 'SCREEN';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gray);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .seats-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin: 2rem 0;
            overflow-x: auto;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .seat {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px 12px 8px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
        }

        .seat:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        .seat.selected {
            background: var(--success);
            border-color: var(--success);
        }

        .seat.booked {
            background: var(--danger);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .seat.available {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Legend */
        .seat-legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-box {
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }

        /* Booking Summary */
        .booking-summary {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .booking-btn-modal {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .booking-btn-modal:hover {
            transform: scale(1.02);
        }

        /* Ticket Modal */
        .ticket-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .ticket {
            background: linear-gradient(135deg, #fff, #f0f0f0);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            color: var(--dark);
            position: relative;
        }

        .ticket h2 {
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .seat {
                width: 35px;
                height: 35px;
                font-size: 0.7rem;
            }
            
            .seat-row {
                gap: 0.5rem;
            }
            
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-film"></i> CineMagic
            </div>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#movies">Movies</a>
                <a href="#contact">Contact</a>
                <a href="#" class="booking-btn" id="viewBookingsBtn">
                    <i class="fas fa-ticket-alt"></i> My Bookings
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero" id="home">
            <h1>Experience Cinema Like Never Before</h1>
            <p>Book your favorite movies, choose your perfect seats, and enjoy the magic of the big screen</p>
        </section>

        <!-- Movies Section -->
        <section id="movies">
            <h2 class="section-title">Now Showing</h2>
            <div class="movies-grid" id="moviesGrid"></div>
        </section>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalMovieTitle" style="margin-bottom: 1rem;"></h2>
            
            <div class="screen"></div>
            
            <div class="seats-container" id="seatsContainer"></div>
            
            <div class="seat-legend">
                <div class="legend-item">
                    <div class="legend-box" style="background: rgba(255,255,255,0.15);"></div>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: var(--success);"></div>
                    <span>Selected</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: var(--danger);"></div>
                    <span>Booked</span>
                </div>
            </div>
            
            <div class="booking-summary">
                <h3>Booking Summary</h3>
                <p><strong>Selected Seats:</strong> <span id="selectedSeats">None</span></p>
                <p><strong>Total Price:</strong> $<span id="totalPrice">0</span></p>
                <button class="booking-btn-modal" id="confirmBookingBtn">Confirm Booking</button>
            </div>
        </div>
    </div>

    <!-- Ticket Modal -->
    <div id="ticketModal" class="ticket-modal">
        <div class="ticket" id="ticketContent"></div>
    </div>

    <script>
        // Movie Data
        const movies = [
            {
                id: 1,
                title: "Dune: Part Two",
                genre: "Sci-Fi",
                duration: "2h 46m",
                rating: 4.8,
                price: 15,
                poster: "https://image.tmdb.org/t/p/w500/8b8R8l88Qje9dnbOE6PY0CIhgym.jpg"
            },
            {
                id: 2,
                title: "Oppenheimer",
                genre: "Drama",
                duration: "3h",
                rating: 4.9,
                price: 16,
                poster: "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg"
            },
            {
                id: 3,
                title: "Barbie",
                genre: "Comedy",
                duration: "1h 54m",
                rating: 4.7,
                price: 14,
                poster: "https://image.tmdb.org/t/p/w500/iuFNMS8U5cb6xfzi51Dbkovj7vM.jpg"
            },
            {
                id: 4,
                title: "John Wick 4",
                genre: "Action",
                duration: "2h 49m",
                rating: 4.8,
                price: 15,
                poster: "https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg"
            },
            {
                id: 5,
                title: "Spider-Man: Across the Spider-Verse",
                genre: "Animation",
                duration: "2h 20m",
                rating: 4.9,
                price: 14,
                poster: "https://image.tmdb.org/t/p/w500/8Vt6mWEReuy4Of61Lnj5Xj704m8.jpg"
            },
            {
                id: 6,
                title: "The Marvels",
                genre: "Action",
                duration: "1h 45m",
                rating: 4.5,
                price: 15,
                poster: "https://image.tmdb.org/t/p/w500/9GBhzXMFjgcZ3FdR9w3bUMMTps5.jpg"
            }
        ];

        // Seat Layout (10 rows, 12 seats per row)
        const ROWS = 10;
        const COLUMNS = 12;
        
        // Store booked seats (from localStorage)
        let bookedSeats = JSON.parse(localStorage.getItem('bookedSeats')) || {};
        let currentMovie = null;
        let selectedSeats = [];

        // Initialize movies grid
        function initMovies() {
            const moviesGrid = document.getElementById('moviesGrid');
            moviesGrid.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="openBooking(${movie.id})">
                    <img class="movie-poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">
                            <span><i class="fas fa-clock"></i> ${movie.duration}</span>
                            <span><i class="fas fa-tag"></i> ${movie.genre}</span>
                        </div>
                        <div class="movie-rating">
                            <i class="fas fa-star"></i> ${movie.rating}/5
                        </div>
                        <div style="margin-top: 1rem; color: var(--primary); font-weight: 600;">
                            $${movie.price} per seat
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Open booking modal
        window.openBooking = function(movieId) {
            currentMovie = movies.find(m => m.id === movieId);
            selectedSeats = [];
            document.getElementById('modalMovieTitle').innerHTML = `<i class="fas fa-film"></i> ${currentMovie.title}`;
            document.getElementById('bookingModal').style.display = 'flex';
            renderSeats();
            updateBookingSummary();
        };

        // Render seats
        function renderSeats() {
            const seatsContainer = document.getElementById('seatsContainer');
            seatsContainer.innerHTML = '';
            
            const movieBookings = bookedSeats[currentMovie?.id] || {};
            
            for (let row = 0; row < ROWS; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'seat-row';
                
                for (let col = 0; col < COLUMNS; col++) {
                    const seatNumber = `${String.fromCharCode(65 + row)}${col + 1}`;
                    const seatDiv = document.createElement('div');
                    seatDiv.className = 'seat';
                    
                    // Check if seat is booked
                    if (movieBookings[seatNumber]) {
                        seatDiv.classList.add('booked');
                        seatDiv.innerHTML = '❌';
                    } else if (selectedSeats.includes(seatNumber)) {
                        seatDiv.classList.add('selected');
                        seatDiv.innerHTML = '✓';
                    } else {
                        seatDiv.classList.add('available');
                        seatDiv.innerHTML = seatNumber;
                    }
                    
                    seatDiv.onclick = (function(r, c) {
                        return function() {
                            const seat = `${String.fromCharCode(65 + r)}${c + 1}`;
                            toggleSeat(seat);
                        };
                    })(row, col);
                    
                    rowDiv.appendChild(seatDiv);
                }
                seatsContainer.appendChild(rowDiv);
            }
        }

        // Toggle seat selection
        function toggleSeat(seatNumber) {
            const movieBookings = bookedSeats[currentMovie?.id] || {};
            
            if (movieBookings[seatNumber]) {
                alert('This seat is already booked!');
                return;
            }
            
            const index = selectedSeats.indexOf(seatNumber);
            if (index > -1) {
                selectedSeats.splice(index, 1);
            } else {
                if (selectedSeats.length >= 8) {
                    alert('You can only book up to 8 seats at once!');
                    return;
                }
                selectedSeats.push(seatNumber);
            }
            
            renderSeats();
            updateBookingSummary();
        }

        // Update booking summary
        function updateBookingSummary() {
            document.getElementById('selectedSeats').textContent = selectedSeats.length > 0 ? selectedSeats.join(', ') : 'None';
            const total = selectedSeats.length * (currentMovie?.price || 0);
            document.getElementById('totalPrice').textContent = total;
        }

        // Confirm booking
        function confirmBooking() {
            if (selectedSeats.length === 0) {
                alert('Please select at least one seat!');
                return;
            }
            
            // Save booking to localStorage
            if (!bookedSeats[currentMovie.id]) {
                bookedSeats[currentMovie.id] = {};
            }
            
            selectedSeats.forEach(seat => {
                bookedSeats[currentMovie.id][seat] = {
                    movieTitle: currentMovie.title,
                    seat: seat,
                    price: currentMovie.price,
                    bookingTime: new Date().toISOString(),
                    bookingId: Math.random().toString(36).substr(2, 9).toUpperCase()
                };
            });
            
            localStorage.setItem('bookedSeats', JSON.stringify(bookedSeats));
            
            // Show ticket
            showTicket(selectedSeats);
            
            selectedSeats = [];
            document.getElementById('bookingModal').style.display = 'none';
        }

        // Show ticket
        function showTicket(seats) {
            const ticketModal = document.getElementById('ticketModal');
            const ticketContent = document.getElementById('ticketContent');
            
            const bookingId = Math.random().toString(36).substr(2, 9).toUpperCase();
            const html = `
                <div style="text-align: center;">
                    <i class="fas fa-check-circle" style="font-size: 4rem; color: var(--success); margin-bottom: 1rem;"></i>
                    <h2 style="color: var(--primary);">Booking Confirmed!</h2>
                    <div style="border-top: 2px dashed #ddd; margin: 1rem 0;"></div>
                    <h3>${currentMovie.title}</h3>
                    <p><strong>Booking ID:</strong> ${bookingId}</p>
                    <p><strong>Seats:</strong> ${seats.join(', ')}</p>
                    <p><strong>Total Amount:</strong> $${seats.length * currentMovie.price}</p>
                    <p><strong>Date & Time:</strong> ${new Date().toLocaleString()}</p>
                    <div style="border-top: 2px dashed #ddd; margin: 1rem 0;"></div>
                    <div style="background: #f0f0f0; padding: 1rem; border-radius: 10px;">
                        <i class="fas fa-qrcode" style="font-size: 3rem;"></i>
                        <p style="font-size: 0.8rem;">Show this QR code at the cinema entrance</p>
                    </div>
                    <button onclick="closeTicket()" style="margin-top: 1rem; background: var(--primary); color: white; border: none; padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer;">
                        Download Ticket
                    </button>
                </div>
            `;
            
            ticketContent.innerHTML = html;
            ticketModal.style.display = 'flex';
        }

        // View all bookings
        function viewBookings() {
            const allBookings = [];
            for (const movieId in bookedSeats) {
                const movie = movies.find(m => m.id == movieId);
                if (movie) {
                    for (const seat in bookedSeats[movieId]) {
                        allBookings.push(bookedSeats[movieId][seat]);
                    }
                }
            }
            
            if (allBookings.length === 0) {
                alert('No bookings found. Book your first movie now!');
                return;
            }
            
            let message = '📋 YOUR BOOKINGS:\n\n';
            allBookings.forEach(booking => {
                message += `${booking.movieTitle} - Seat ${booking.seat} - $${booking.price}\n   Booking ID: ${booking.bookingId}\n   Time: ${new Date(booking.bookingTime).toLocaleString()}\n\n`;
            });
            
            alert(message);
        }

        // Close ticket modal
        window.closeTicket = function() {
            document.getElementById('ticketModal').style.display = 'none';
            renderSeats();
        };

        // Close modals
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.onclick = function() {
                document.getElementById('bookingModal').style.display = 'none';
            };
        });
        
        document.getElementById('viewBookingsBtn').onclick = function(e) {
            e.preventDefault();
            viewBookings();
        };
        
        document.getElementById('confirmBookingBtn').onclick = confirmBooking;
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('bookingModal');
            const ticketModal = document.getElementById('ticketModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
            if (event.target === ticketModal) {
                ticketModal.style.display = 'none';
            }
        };

        // Initialize
        initMovies();
    </script>
</body>
</html>
